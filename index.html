<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>beat brother game</title>
<style>
body{font-family:Arial;text-align:center;margin-top:100px}
button{font-size:20px;padding:20px 40px}
</style>
</head>
<body>

<h1>暴打哥哥游戏</h1>

<p>哥哥血量：<span id="hp">50</span></p>

<button onclick="hit()">打哥哥</button>

<p id="log"></p>

<script>
let hp = 50;

function hit(){
    let dmg = Math.floor(Math.random()*6)+1;

    // 20%暴击
    if(Math.random()<0.2){
        dmg *= 2;
        document.getElementById("log").innerText = "暴击！"
    } else {
        document.getElementById("log").innerText = ""
    }

    hp -= dmg;

    // 哥哥反击
    let counter = Math.floor(Math.random()*4)+1;
    alert("哥哥反击你 " + counter + " 点爱意（伤害）");

    document.getElementById("hp").innerText = hp;

    if(hp <= 0){
        document.body.innerHTML = "<h1>你赢了，哥哥倒下了</h1>";
    }
}
</script>

</body>
</html>
