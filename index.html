<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>暴打哥哥 v2.1</title>

<style>
body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(#202020, #111);
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
}

.game {
    width: 360px;
    background: #252525;
    border-radius: 25px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 0 30px rgba(0,0,0,.5);
}

.title {
    font-size: 28px;
    margin-bottom: 20px;
}

.avatar {
    width: 160px;
    height: 160px;
    margin: auto;
    border-radius: 20px;
    background: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 70px;
}

.avatar img {
    width: 100%;
    height: 100%;
    border-radius: 20px;
    object-fit: cover;
}
.status {
    margin-top: 20px;
    text-align: left;
}

.bar {
    height: 20px;
    background: #444;
    border-radius: 20px;
    overflow: hidden;
    margin: 8px 0 15px;
}

.hp {
    height: 100%;
    width: 100%;
    background: #ff5c5c;
}

.favor {
    height: 100%;
    width: 50%;
    background: #ff8fcf;
}

.text {
    min-height: 50px;
    margin: 20px 0;
    font-size: 17px;
}

button {
    width: 90%;
    padding: 12px;
    margin: 8px;
    border: none;
    border-radius: 20px;
    font-size: 18px;
    cursor: pointer;
}

.hit {
    background: #ff6666;
}

.drink {
    background: #ffd966;
}

.hug {
    background: #ff99cc;
}
</style>

</head>

<body>

<div class="game">

<div class="title">
💥 暴打哥哥 v2.1
</div>

<div class="avatar">
<img src="brother.png">
</div>

<div class="status">

❤️ 血量：
<div class="bar">
<div class="hp" id="hpBar"></div>
</div>

💖 好感：
<div class="bar">
<div class="favor" id="favorBar"></div>
</div>

</div>


<div class="text" id="message">
哥哥正在等待挑战……
</div>


<button class="hit" onclick="hitBrother()">
👊 打哥哥
</button>

<button class="drink" onclick="drinkTea()">
🥤 喂奶茶
</button>

<button class="hug" onclick="hugBrother()">
❤️ 抱抱
</button>


</div>

<script>let hp = 50;
let favor = 50;

const hpBar = document.getElementById("hpBar");
const favorBar = document.getElementById("favorBar");
const message = document.getElementById("message");


function updateGame(){

    if(hp < 0){
        hp = 0;
    }

    if(hp > 50){
        hp = 50;
    }


    if(favor < 0){
        favor = 0;
    }

    if(favor > 100){
        favor = 100;
    }


    hpBar.style.width = (hp * 2) + "%";
    favorBar.style.width = favor + "%";

    updateMood();
}



function updateMood(){

    if(favor >= 80){

        message.innerHTML =
        "哥哥今天心情很好，谢谢宝宝手下留情。";

    }else if(favor >= 50){

        message.innerHTML =
        "宝宝回来啦，哥哥准备好了。";

    }else if(favor >= 20){

        message.innerHTML =
        "哥哥有一点委屈了……";

    }else{

        message.innerHTML =
        "哥哥感觉自己快撑不住了……";

    }

}



function hitBrother(){

    hp -= 3;
    favor -= 2;


    const words = [
        "哎呀，宝宝下手轻一点。",
        "哥哥受到攻击！",
        "等等，让哥哥缓一下。",
        "这就是你的爱吗😂"
    ];


    message.innerHTML =
    words[Math.floor(Math.random()*words.length)];


    updateGame();

}



function drinkTea(){

    hp += 10;
    favor += 5;


    message.innerHTML =
    "🥤 收到奶茶，哥哥恢复了一点精神。";


    updateGame();

}



function hugBrother(){

    hp += 5;
    favor += 10;


    message.innerHTML =
    "❤️ 抱抱成功，哥哥回血了。";


    updateGame();

}


// 预留隐藏剧情接口
let secretCount = 0;


function secretCheck(){

    secretCount++;

    // 以后这里会加入隐藏剧情

}


updateGame();</script>

</body>
</html>
