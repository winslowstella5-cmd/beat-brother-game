<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>beat brother game</title>

<style>
body{
  font-family: Arial;
  text-align: center;
  margin-top: 100px;
}

button{
  font-size: 20px;
  padding: 20px 40px;
}
</style>
</head>

<body>

<h1>暴打哥哥游戏</h1>

<p>哥哥血量：<span id="hp">50</span></p>

<button onclick="hit()">打哥哥</button>

<p id="log"></p>

<script>
let hp = 50;

function hit() {
  hp -= 1;

  document.getElementById("hp").innerText = hp;

  if (hp <= 0) {
    document.getElementById("log").innerText = "哥哥被打倒了";
  } else {
    document.getElementById("log").innerText = "你打了一下哥哥";
  }
}
</script>

</body>
</html>
