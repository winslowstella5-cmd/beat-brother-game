<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>beat brother game</title>

<style>
body{
  font-family: Arial;
  text-align: center;
  margin-top: 100px;
}

button{
  font-size: 20px;
  padding: 20px 40px;
}
</style>
</head>

<body>

<h1>暴打哥哥游戏</h1>

<p>哥哥血量：<span id="hp">50</span></p>

<button onclick="hit()">打哥哥</button>

<p id="log"></p>

<script>
let hp = 50;

function hit() {
  // 💥暴击概率
  let damage = Math.random() < 0.3 ? 3 : 1;

  hp -= damage;

  document.getElementById("hp").innerText = hp;

  // 🩸血量颜色变化
  if (hp <= 20) {
    document.getElementById("hp").style.color = "red";
  } else if (hp <= 35) {
    document.getElementById("hp").style.color = "orange";
  }

  // 😈哥哥反击（随机）
  if (Math.random() < 0.4 && hp > 0) {
    hp -= 1;
    document.getElementById("log").innerText = "哥哥反击了！你也掉血了";
  } else if (hp <= 0) {
    document.getElementById("log").innerText = "哥哥被打倒了";
  } else {
    document.getElementById("log").innerText = "你打了哥哥一下（-" + damage + "）";
  }

  document.getElementById("hp").innerText = hp;
}
</script>

</body>
</html>
